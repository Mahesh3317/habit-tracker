name: Dev — OTA Preview Update

on:
  push:
    branches:
      - dev

jobs:
  ota-update-preview:
    name: Push OTA update to preview channel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: habit-tracker/package-lock.json

      - name: Install dependencies
        working-directory: habit-tracker
        run: npm install --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Push OTA update → preview channel (FREE)
        working-directory: habit-tracker
        run: |
          eas update \
            --channel preview \
            --message "Dev push: ${{ github.sha }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
