name: Production — OTA Update on PR Merge

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  ota-update-production:
    name: Push OTA update to production channel
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Push OTA update → production channel (FREE)
        run: |
          eas update \
            --channel production \
            --message "Release: PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
